name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — lint, build, test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: agri
          POSTGRES_PASSWORD: agri
          POSTGRES_DB: agri_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgres://agri:agri@localhost:5432/agri_test
      JWT_SECRET: ci-test-secret
      STELLAR_NETWORK: testnet
      STELLAR_HORIZON_URL: https://horizon-testnet.stellar.org
      STELLAR_PLATFORM_SECRET: ""
      ENCRYPTION_KEY: ci-test-encryption-key-32chars!!
      RABBITMQ_URL: amqp://localhost:5672

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Lint
        run: npm run lint -- --max-warnings=0
        working-directory: backend

      - name: Build
        run: npm run build
        working-directory: backend

      - name: Test
        run: npm test -- --forceExit --passWithNoTests
        working-directory: backend
